name: Proxy Authentication
version: 1.7.1
description: Authenticate users based on headers set by upstream proxy servers.
icon: sign-in
author:
  name: Ilya Kogan
  email: ikogan@mythicnet.org
keywords: login, authentication
license: DBAD

compatibility:
  grav: ['1.7', '2.0']

dependencies:
  - { name: grav, version: '>=1.7.0' }
  - { name: login, version: '>=3.4' }
  - form

form:
  validation: strict
  fields:
    enabled:
      type: toggle
      label: PLUGIN_ADMIN.PLUGIN_STATUS
      highlight: 1
      default: 0
      options:
        1: PLUGIN_ADMIN.ENABLED
        0: PLUGIN_ADMIN.DISABLED
      validate:
        type: bool

    route:
      type: text
      size: medium
      label: Base Login Route
      default: '/login'
      help: 'Base route for login mapping, e.g. /login'

    route_mapping:
      type: list
      label: Login Route Mapping
      help: Map specific login routes to roles and redirects.
      collapsible: false
      collapsed: false
      fields:
        .group:
          type: text
          label: Group
          help: 'This group will be assigned and used as the route path, e.g. "admin" becomes /login/admin'
        .redirect:
          type: text
          label: Redirect Target
          help: 'Where to redirect after login (e.g. /admin)'

    headers.username:
      type: text
      size: medium
      label: Username header
      default: 'X-Remote-User'

    headers.username_regex:
      type: text
      size: medium
      label: Username Extraction Regex
      help: 'Optional regular expression to extract the username from the header (e.g. "/(.*)/"). First capture group will be used.'

    headers.displayName:
      type: text
      size: medium
      label: User display name header
      default: 'X-Remote-Display-Name'

    headers.email:
      type: text
      size: medium
      label: User e-mail address header
      default: 'X-Remote-Email'

    headers.email_regex:
      type: text
      size: medium
      label: Email Extraction Regex
      help: 'Optional regular expression to extract the email from the header (e.g. "/(?:.*:)?(.*@.*)/"). First capture group will be used.'

    headers.groups:
      type: text
      size: medium
      label: User group memberships header
      default: 'X-Remote-Groups'

    groupSeparator:
      type: text
      size: small
      label: Groups separator character
      default: ','

    required.groups:
      type: selectize
      size: large
      label: Required Groups
      classes: fancy
      help: Groups a user must have in order to get site access.
      validate:
        type: commalist

    url.login:
      type: text
      size: large
      label: Login URL
      help: |
        URL to send users to when they need to login. Note
        ${CURRENT_URL} will be replaced with the URL user's are
        currently visiting.

    url.logout:
      type: text
      size: large
      label: Logout URL
      help: |
        URL to send users to when they need to logout. Note
        ${CURRENT_URL} will be replaced with the URL user's are
        currently visiting.
